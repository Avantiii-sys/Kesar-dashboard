<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kesar Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-slate-900 text-white p-6 text-center">

<h1 class="text-3xl font-bold mb-6 text-cyan-400">
🌱 Kesar Smart Dashboard (Simulation)
</h1>

<!-- CARDS -->
<div class="flex justify-center gap-6">

  <div class="bg-slate-800 p-6 rounded-xl w-48">
    <h2>🌡️ Temperature</h2>
    <p id="temp" class="text-2xl font-bold">--</p>
    <p id="tempStatus"></p>
  </div>

  <div class="bg-slate-800 p-6 rounded-xl w-48">
    <h2>💧 Humidity</h2>
    <p id="hum" class="text-2xl font-bold">--</p>
    <p id="humStatus"></p>
  </div>

</div>

<!-- ALERT -->
<div class="mt-6">
  <h2 class="text-xl">🚨 Alerts</h2>
  <p id="alerts" class="text-lg">Waiting...</p>
</div>

<!-- GRAPH -->
<div class="mt-6 w-full max-w-xl mx-auto">
  <canvas id="chart"></canvas>
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSJJpup-f7obvMusWbE9e3AO_wPfX_qcHgRuoydu6G25jkk2-SxCXgsAjv4WBAREAlSonC_SC-3daq6/pub?output=csv";

let data = [];
let index = 0;
let chart;

async function loadData() {
  const res = await fetch(sheetURL);
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1);

  data = rows.map(row => {
    const cols = row.split(",");
    return {
      time: cols[0],
      temp: parseFloat(cols[1]),
      hum: parseFloat(cols[2])
    };
  });

  updateUI();
}

function updateUI() {
  if (index >= data.length) index = 0;

  const d = data[index];

  document.getElementById("temp").innerText = d.temp + " °C";
  document.getElementById("hum").innerText = d.hum + " %";

  // STATUS
  document.getElementById("tempStatus").innerText =
    d.temp > 25 ? "🔴 High" : "🟢 Normal";

  document.getElementById("humStatus").innerText =
    d.hum < 40 ? "🔴 Low" : "🟢 Normal";

  // ALERTS
  let alert = "";
  if (d.temp > 25) alert += "🔥 Temp too high! ";
  if (d.hum < 40) alert += "💧 Humidity too low! ";

  document.getElementById("alerts").innerText =
    alert || "All good ✅";

  // GRAPH
  if (!chart) {
    const ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          {
            label: "Temperature",
            data: []
          },
          {
            label: "Humidity",
            data: []
          }
        ]
      }
    });
  }

  chart.data.labels.push(d.time);
  chart.data.datasets[0].data.push(d.temp);
  chart.data.datasets[1].data.push(d.hum);

  if (chart.data.labels.length > 10) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }

  chart.update();

  index++;
}

setInterval(updateUI, 5000);

loadData();

</script>

</body>
</html>
