<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kesar Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-orange-50 text-gray-800 p-6 text-center">

<h1 class="text-3xl font-bold mb-6 text-orange-600">
🌱 Kesar Smart Incubation Dashboard
</h1>

<!-- CARDS -->
<div class="flex justify-center gap-6 flex-wrap">

  <div class="bg-white p-6 rounded-xl shadow-md w-52">
    <h2 class="text-orange-500 font-semibold">🌡️ Temperature</h2>
    <p id="temp" class="text-3xl font-bold mt-2">--</p>
    <p id="tempStatus" class="mt-1"></p>
  </div>

  <div class="bg-white p-6 rounded-xl shadow-md w-52">
    <h2 class="text-orange-500 font-semibold">💧 Humidity</h2>
    <p id="hum" class="text-3xl font-bold mt-2">--</p>
    <p id="humStatus" class="mt-1"></p>
  </div>

</div>

<!-- ALERT -->
<div class="mt-6">
  <h2 class="text-xl text-orange-600 font-semibold">🚨 Alerts</h2>
  <p id="alerts" class="text-lg mt-2"></p>
</div>

<!-- GRAPH -->
<div class="mt-8 max-w-2xl mx-auto bg-white p-4 rounded-xl shadow-md">
  <canvas id="chart"></canvas>
</div>

<script>

const sheetURL = "YOUR_SHEET_LINK";

let data = [];
let index = 0;
let chart;

async function loadData() {
  const res = await fetch(sheetURL);
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1);

  data = rows.map(row => {
    const cols = row.split(",");
    return {
      time: cols[0],
      temp: parseFloat(cols[1]),
      hum: parseFloat(cols[2])
    };
  });

  updateUI();
}

function updateUI() {
  if (index >= data.length) index = 0;

  const d = data[index];

  document.getElementById("temp").innerText = d.temp + " °C";
  document.getElementById("hum").innerText = d.hum + " %";

  // STATUS COLORS
  const tempStatus = document.getElementById("tempStatus");
  const humStatus = document.getElementById("humStatus");

  if (d.temp > 25) {
    tempStatus.innerText = "High";
    tempStatus.className = "text-red-500";
  } else {
    tempStatus.innerText = "Normal";
    tempStatus.className = "text-green-500";
  }

  if (d.hum < 40) {
    humStatus.innerText = "Low";
    humStatus.className = "text-red-500";
  } else {
    humStatus.innerText = "Normal";
    humStatus.className = "text-green-500";
  }

  // ALERTS
  let alert = "";
  if (d.temp > 25) alert += "🔥 Temperature too high! ";
  if (d.hum < 40) alert += "💧 Humidity too low! ";

  document.getElementById("alerts").innerText =
    alert || "All conditions optimal ✅";

  // GRAPH
  if (!chart) {
    const ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          {
            label: "Temperature",
            data: [],
            borderColor: "#f97316"
          },
          {
            label: "Humidity",
            data: [],
            borderColor: "#fb923c"
          }
        ]
      }
    });
  }

  chart.data.labels.push(d.time);
  chart.data.datasets[0].data.push(d.temp);
  chart.data.datasets[1].data.push(d.hum);

  if (chart.data.labels.length > 10) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }

  chart.update();

  index++;
}

setInterval(updateUI, 5000);

loadData();

</script>

</body>
</html>
