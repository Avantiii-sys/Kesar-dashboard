<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kesar Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

</head>

<body class="bg-orange-50 text-gray-800 dark:bg-[#0b1a2f] dark:text-white p-6 text-center transition-all duration-300">

<!-- 🌙 TOGGLE BUTTON -->
<button onclick="toggleDark()" id="themeBtn"
class="fixed top-4 right-4 px-3 py-1 text-sm bg-orange-500 text-white rounded-md shadow">
🌙 Dark
</button>

<h1 class="text-3xl font-bold mb-6 text-orange-600 dark:text-cyan-300">
🌱 Kesar Smart Dashboard
</h1>

<!-- CARDS -->
<div class="flex justify-center gap-6 flex-wrap">

  <div class="bg-white dark:bg-[#1f2e45] p-6 rounded-xl shadow-md w-52">
    <h2 class="text-orange-500 dark:text-cyan-300 font-semibold">🌡️ Temperature</h2>
    <p id="temp" class="text-3xl font-bold mt-2 text-gray-900 dark:text-white">--</p>
    <p id="tempStatus" class="mt-1"></p>
  </div>

  <div class="bg-white dark:bg-[#1f2e45] p-6 rounded-xl shadow-md w-52">
    <h2 class="text-orange-500 dark:text-cyan-300 font-semibold">💧 Humidity</h2>
    <p id="hum" class="text-3xl font-bold mt-2 text-gray-900 dark:text-white">--</p>
    <p id="humStatus" class="mt-1"></p>
  </div>

</div>

<!-- ALERT -->
<div class="mt-6">
  <h2 class="text-xl text-orange-600 dark:text-cyan-300 font-semibold">🚨 Alerts</h2>
  <p id="alerts" class="text-lg mt-2">Loading...</p>

  <!-- 🟢 STATUS + TIME -->
  <div class="mt-3">
    <p id="lastUpdate" class="text-sm"></p>
    <p id="statusBadge" class="text-sm font-semibold"></p>
  </div>
</div>

<!-- GRAPH -->
<div class="mt-8 max-w-2xl mx-auto bg-white dark:bg-[#1f2e45] p-4 rounded-xl shadow-md">
  <canvas id="chart"></canvas>
</div>

<script>

// 🌙 DARK MODE
function toggleDark() {
  document.body.classList.toggle("dark");

  const btn = document.getElementById("themeBtn");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    btn.innerText = "☀️ Light";
  } else {
    localStorage.setItem("theme", "light");
    btn.innerText = "🌙 Dark";
  }

  updateChartTheme();
}

// Load theme
window.onload = () => {
  const btn = document.getElementById("themeBtn");

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    btn.innerText = "☀️ Light";
  }
};

// 🔥 THINGSPEAK CONFIG
const channelID = "3329966";
const readAPI = "1VBVCE79U9BNG713";

let chart;

async function fetchData() {
  try {
    const res = await fetch(
      `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPI}&results=10`
    );

    const data = await res.json();
    const feeds = data.feeds;

    if (!feeds || feeds.length === 0) return;

    const temps = feeds.map(f => parseFloat(f.field1));
    const hums = feeds.map(f => parseFloat(f.field2));
    const labels = feeds.map(f => new Date(f.created_at).toLocaleTimeString());

    const latestTemp = temps[temps.length - 1];
    const latestHum = hums[hums.length - 1];
    const latestTime = feeds[feeds.length - 1].created_at;

    // VALUES
    document.getElementById("temp").innerText = latestTemp + " °C";
    document.getElementById("hum").innerText = latestHum + " %";

    // STATUS TEXT
    document.getElementById("tempStatus").innerText =
      latestTemp > 25 ? "High" : "Normal";

    document.getElementById("tempStatus").className =
      latestTemp > 25 ? "text-red-500" : "text-green-500";

    document.getElementById("humStatus").innerText =
      latestHum < 40 ? "Low" : "Normal";

    document.getElementById("humStatus").className =
      latestHum < 40 ? "text-red-500" : "text-green-500";

    // ALERTS
    let alert = "";
    if (latestTemp > 25) alert += "🔥 Temperature too high! ";
    if (latestHum < 40) alert += "💧 Humidity too low! ";

    document.getElementById("alerts").innerText =
      alert || "All conditions optimal ✅";

    // 🟢 LAST UPDATED
    document.getElementById("lastUpdate").innerText =
      "Last updated: " + new Date(latestTime).toLocaleTimeString();

    // 🟢 STATUS BADGE
    const now = new Date();
    const last = new Date(latestTime);
    const diff = (now - last) / 1000;

    if (diff > 60) {
      document.getElementById("statusBadge").innerText = "🟡 Delayed Data";
      document.getElementById("statusBadge").className = "text-yellow-500 font-semibold";
    } else {
      document.getElementById("statusBadge").innerText = "🟢 Live";
      document.getElementById("statusBadge").className = "text-green-500 font-semibold";
    }

    // GRAPH
    if (!chart) {
      const ctx = document.getElementById("chart").getContext("2d");

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            {
              label: "Temperature (°C)",
              data: temps,
              borderColor: "#f97316",
              tension: 0.3
            },
            {
              label: "Humidity (%)",
              data: hums,
              borderColor: "#38bdf8",
              tension: 0.3
            }
          ]
        },
        options: getChartOptions()
      });
    } else {
      chart.data.labels = labels;
      chart.data.datasets[0].data = temps;
      chart.data.datasets[1].data = hums;
      chart.options = getChartOptions();
      chart.update();
    }

  } catch (err) {
    console.error(err);

    document.getElementById("alerts").innerText = "⚠️ Fetch failed";

    document.getElementById("statusBadge").innerText = "🔴 Connection Lost";
    document.getElementById("statusBadge").className = "text-red-500 font-semibold";
  }
}

// 🎨 CHART THEME
function getChartOptions() {
  const isDark = document.body.classList.contains("dark");

  return {
    plugins: {
      legend: {
        labels: {
          color: isDark ? "#ffffff" : "#000000"
        }
      }
    },
    scales: {
      x: {
        ticks: {
          color: isDark ? "#ffffff" : "#000000"
        }
      },
      y: {
        ticks: {
          color: isDark ? "#ffffff" : "#000000"
        }
      }
    }
  };
}

function updateChartTheme() {
  if (chart) {
    chart.options = getChartOptions();
    chart.update();
  }
}

// UPDATE LOOP
setInterval(fetchData, 15000);
fetchData();

</script>

</body>
</html>
