<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kesar Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

</head>

<body class="bg-orange-50 text-gray-800 dark:bg-gray-900 dark:text-white p-6 text-center">

<h1 class="text-3xl font-bold mb-4 text-orange-600 dark:text-orange-400">
🌱 Kesar Smart Incubation Dashboard
</h1>

<button onclick="toggleDark()" 
class="mb-6 px-4 py-2 bg-orange-500 text-white rounded-lg">
Toggle Dark Mode 🌙
</button>

<!-- CARDS -->
<div class="flex justify-center gap-6 flex-wrap">

  <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md w-52">
    <h2 class="text-orange-500 font-semibold">🌡️ Temperature</h2>
    <p id="temp" class="text-3xl font-bold mt-2">--</p>
    <p id="tempStatus" class="mt-1"></p>
  </div>

  <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md w-52">
    <h2 class="text-orange-500 font-semibold">💧 Humidity</h2>
    <p id="hum" class="text-3xl font-bold mt-2">--</p>
    <p id="humStatus" class="mt-1"></p>
  </div>

</div>

<!-- ALERT -->
<div class="mt-6">
  <h2 class="text-xl text-orange-600 dark:text-orange-400 font-semibold">🚨 Alerts</h2>
  <p id="alerts" class="text-lg mt-2">Loading...</p>
</div>

<!-- GRAPH -->
<div class="mt-8 max-w-2xl mx-auto bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md">
  <canvas id="chart"></canvas>
</div>

<script>

// 🌙 DARK MODE TOGGLE
function toggleDark() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

// 🔥 THINGSPEAK CONFIG
const channelID = "3329966";
const readAPI = "1VBVCE79U9BNG713";

let chart;

async function fetchData() {
  try {
    const res = await fetch(
      `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPI}&results=10`
    );

    const data = await res.json();
    const feeds = data.feeds;

    if (!feeds || feeds.length === 0) return;

    const temps = feeds.map(f => parseFloat(f.field1));
    const hums = feeds.map(f => parseFloat(f.field2));

    const latestTemp = temps[temps.length - 1];
    const latestHum = hums[hums.length - 1];

    // UPDATE VALUES
    document.getElementById("temp").innerText = latestTemp + " °C";
    document.getElementById("hum").innerText = latestHum + " %";

    // STATUS
    const tempStatus = document.getElementById("tempStatus");
    const humStatus = document.getElementById("humStatus");

    if (latestTemp > 25) {
      tempStatus.innerText = "High";
      tempStatus.className = "text-red-500";
    } else {
      tempStatus.innerText = "Normal";
      tempStatus.className = "text-green-500";
    }

    if (latestHum < 40) {
      humStatus.innerText = "Low";
      humStatus.className = "text-red-500";
    } else {
      humStatus.innerText = "Normal";
      humStatus.className = "text-green-500";
    }

    // ALERTS
    let alert = "";
    if (latestTemp > 25) alert += "🔥 Temperature too high! ";
    if (latestHum < 40) alert += "💧 Humidity too low! ";

    document.getElementById("alerts").innerText =
      alert || "All conditions optimal ✅";

    // GRAPH
    if (!chart) {
      const ctx = document.getElementById("chart").getContext("2d");

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: feeds.map((_, i) => i),
          datasets: [
            {
              label: "Temperature",
              data: temps,
              borderColor: "#f97316",
              tension: 0.3
            },
            {
              label: "Humidity",
              data: hums,
              borderColor: "#fb923c",
              tension: 0.3
            }
          ]
        }
      });
    } else {
      chart.data.labels = feeds.map((_, i) => i);
      chart.data.datasets[0].data = temps;
      chart.data.datasets[1].data = hums;
      chart.update();
    }

  } catch (err) {
    console.error(err);
    document.getElementById("alerts").innerText = "⚠️ Fetch failed";
  }
}

// ⏱️ ThingSpeak limit
setInterval(fetchData, 15000);
fetchData();

</script>

</body>
</html>
